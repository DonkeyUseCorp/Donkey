name: Nightly Donkey Build

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-donkey-build
  cancel-in-progress: true

jobs:
  nightly:
    name: Build nightly
    # macOS 26 image ships the Xcode 26 SDK, which defines the SpeechAnalyzer /
    # SpeechTranscriber APIs the app compiles against (gated to macOS 26 at runtime).
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Fetch tags
        run: git fetch --tags --force origin

      - name: Check for nightly changes
        id: changes
        env:
          TAG: nightly
        run: |
          target_sha="$(git rev-parse HEAD)"
          previous_sha=""
          should_build=true

          if previous_sha="$(git rev-parse -q --verify "${TAG}^{commit}")"; then
            if [[ "$previous_sha" == "$target_sha" ]]; then
              should_build=false
            fi
          fi

          {
            echo "target_sha=$target_sha"
            echo "previous_sha=$previous_sha"
            echo "should_build=$should_build"
          } >> "$GITHUB_OUTPUT"

      - name: Skip unchanged nightly build
        if: steps.changes.outputs.should_build != 'true'
        run: |
          echo "The nightly tag already points at ${TARGET_SHA}; skipping package and publish steps."
        env:
          TARGET_SHA: ${{ steps.changes.outputs.target_sha }}

      - name: Prepare nightly values
        if: steps.changes.outputs.should_build == 'true'
        id: nightly
        run: |
          version="$(python3 - <<'PY'
          from datetime import UTC, datetime

          now = datetime.now(UTC)
          print(f"{now.year}.{now.month}.{now.day}")
          PY
          )"
          build="${GITHUB_RUN_NUMBER}"
          if [[ ! "$build" =~ ^[0-9]+$ ]]; then
            echo "Build must be numeric for CFBundleVersion." >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "build=$build"
            echo "tag=nightly"
            echo "target_sha=${{ steps.changes.outputs.target_sha }}"
            echo "built_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } >> "$GITHUB_OUTPUT"

      - name: Install packaging dependencies
        if: steps.changes.outputs.should_build == 'true'
        run: |
          if ! command -v magick >/dev/null 2>&1; then
            brew install imagemagick
          fi

      # The bundled CLI tools (ffmpeg, lit, pdf-fill, qpdf, …) are gitignored and
      # built/fetched by fetch-bundled-tools.sh. Cache the result so we don't rebuild
      # ffmpeg/Rust from source every night; the key busts when the recipe or the
      # in-repo pdf-fill source changes.
      - name: Restore bundled tools cache
        if: steps.changes.outputs.should_build == 'true'
        id: tools-cache
        uses: actions/cache@v4
        with:
          path: vendor/donkey-tools
          key: donkey-tools-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/fetch-bundled-tools.sh', 'tools/pdf-fill/main.swift') }}

      - name: Vendor bundled tools
        if: steps.changes.outputs.should_build == 'true' && steps.tools-cache.outputs.cache-hit != 'true'
        run: ./scripts/fetch-bundled-tools.sh

      - name: Package Donkey
        if: steps.changes.outputs.should_build == 'true'
        env:
          DONKEY_APP_VERSION: ${{ steps.nightly.outputs.version }}
          DONKEY_APP_BUILD: ${{ steps.nightly.outputs.build }}
        run: ./scripts/package-donkey-app.sh

      - name: Generate checksum
        if: steps.changes.outputs.should_build == 'true'
        run: shasum -a 256 dist/Donkey.dmg > dist/Donkey.dmg.sha256

      - name: Publish nightly prerelease
        if: steps.changes.outputs.should_build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.nightly.outputs.tag }}
          TARGET_SHA: ${{ steps.nightly.outputs.target_sha }}
          BUILT_AT: ${{ steps.nightly.outputs.built_at }}
        run: |
          git tag -f "$TAG" "$TARGET_SHA"
          git push origin "refs/tags/$TAG" --force

          notes_file="$RUNNER_TEMP/nightly-release-notes.md"
          cat > "$notes_file" <<NOTES
          This is the latest Donkey nightly build.

          Built from \`$TARGET_SHA\` at \`$BUILT_AT\` UTC.

          Nightly builds are prereleases and may be replaced by the next nightly run.
          NOTES

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/Donkey.dmg dist/Donkey.dmg.sha256 --clobber
            gh release edit "$TAG" \
              --title "Donkey Nightly Build" \
              --notes-file "$notes_file" \
              --target "$TARGET_SHA" \
              --prerelease \
              --latest=false
          else
            gh release create "$TAG" dist/Donkey.dmg dist/Donkey.dmg.sha256 \
              --target "$TARGET_SHA" \
              --title "Donkey Nightly Build" \
              --notes-file "$notes_file" \
              --prerelease \
              --latest=false
          fi
