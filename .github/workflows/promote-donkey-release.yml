name: Release Donkey

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-donkey
  cancel-in-progress: false

jobs:
  release:
    name: Build and release
    # The macos-26 image carries the Xcode 26 SDK that defines the SpeechAnalyzer /
    # SpeechTranscriber APIs the app compiles against (gated to macOS 26 at runtime).
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${{ github.event.repository.default_branch }}" "origin/${{ github.event.repository.default_branch }}"
          git branch --set-upstream-to="origin/${{ github.event.repository.default_branch }}" "${{ github.event.repository.default_branch }}"

      - name: Fetch tags
        run: git fetch --tags --force origin

      - name: Prepare release values
        id: release
        run: |
          version="$(python3 - "${{ inputs.bump }}" <<'PY'
          from __future__ import annotations

          import re
          import subprocess
          import sys

          bump = sys.argv[1]
          if bump not in {"major", "minor", "patch"}:
              raise SystemExit(f"Unsupported version bump: {bump}")

          tag_re = re.compile(r"^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$")
          tags = subprocess.check_output(["git", "tag", "--list"], text=True).splitlines()
          versions = [
              tuple(int(part) for part in match.groups())
              for tag in tags
              if (match := tag_re.match(tag.strip()))
          ]

          if versions:
              major, minor, patch = max(versions)
              if bump == "major":
                  major, minor, patch = major + 1, 0, 0
              elif bump == "minor":
                  minor, patch = minor + 1, 0
              else:
                  patch += 1
          else:
              major, minor, patch = 0, 1, 0

          print(f"{major}.{minor}.{patch}")
          PY
          )"

          build="${GITHUB_RUN_NUMBER}"
          if [[ ! "$build" =~ ^[0-9]+$ ]]; then
            echo "Build must be numeric for CFBundleVersion." >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "tag=v$version"
            echo "build=$build"
            echo "target_sha=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Check Sparkle secrets
        env:
          DONKEY_SPARKLE_PUBLIC_ED_KEY: ${{ secrets.DONKEY_SPARKLE_PUBLIC_ED_KEY }}
          DONKEY_SPARKLE_PRIVATE_ED_KEY: ${{ secrets.DONKEY_SPARKLE_PRIVATE_ED_KEY }}
        run: |
          if [[ -z "$DONKEY_SPARKLE_PUBLIC_ED_KEY" ]]; then
            echo "Missing DONKEY_SPARKLE_PUBLIC_ED_KEY repository secret." >&2
            exit 1
          fi
          if [[ -z "$DONKEY_SPARKLE_PRIVATE_ED_KEY" ]]; then
            echo "Missing DONKEY_SPARKLE_PRIVATE_ED_KEY repository secret." >&2
            exit 1
          fi

      - name: Install packaging dependencies
        run: |
          if ! command -v magick >/dev/null 2>&1; then
            brew install imagemagick
          fi

      # Import the Developer ID cert into a throwaway keychain and stage the notary API key, so the app
      # and DMG are signed + notarized. Absent the secrets this no-ops to ad-hoc signing (runnable
      # locally, not distributable), so a release without signing configured still builds.
      - name: Set up Developer ID signing
        id: signing
        env:
          CERT_P12: ${{ secrets.DONKEY_DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DONKEY_DEVELOPER_ID_CERT_PASSWORD }}
          SIGN_IDENTITY: ${{ secrets.DONKEY_APP_SIGN_IDENTITY }}
          NOTARY_KEY_P8: ${{ secrets.DONKEY_NOTARY_KEY_P8 }}
        run: |
          if [ -z "$CERT_P12" ] || [ -z "$SIGN_IDENTITY" ]; then
            echo "::warning::No Developer ID secrets; the app will be ad-hoc signed (not for distribution)."
            echo "identity=-" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          keychain="$RUNNER_TEMP/donkey-signing.keychain-db"
          kpw="$(uuidgen)"
          security create-keychain -p "$kpw" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$kpw" "$keychain"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$keychain" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$kpw" "$keychain" >/dev/null
          security list-keychains -d user -s "$keychain" $(security list-keychains -d user | sed -e 's/"//g')
          rm -f "$RUNNER_TEMP/cert.p12"

          # Show what actually landed in the keychain. The identity name is a registered secret so GitHub
          # masks it as ***, but the "N valid identities found" count is not: 0 means the .p12 had no usable
          # codesigning identity (typically a cert exported without its private key); 1+ means the cert+key
          # imported fine and any later "no identity found" is a name mismatch with DONKEY_APP_SIGN_IDENTITY.
          echo "Codesigning identities in the signing keychain:"
          security find-identity -v -p codesigning "$keychain"
          # Fail here with an actionable message rather than letting codesign abort later with a terse error.
          if ! security find-identity -v -p codesigning "$keychain" | grep -qF "$SIGN_IDENTITY"; then
            echo "::error::Requested signing identity not present in the keychain. Confirm DONKEY_APP_SIGN_IDENTITY matches the cert's name exactly (no trailing whitespace) and that DONKEY_DEVELOPER_ID_CERT_P12 includes the private key."
            exit 1
          fi
          echo "Requested signing identity is present and usable."
          if [ -n "$NOTARY_KEY_P8" ]; then
            echo "$NOTARY_KEY_P8" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          fi
          echo "identity=$SIGN_IDENTITY" >> "$GITHUB_OUTPUT"

      # The bundled CLI tools (ffmpeg, lit, pdf-fill, …) are NOT baked into the app: it downloads
      # them on first run from the artifact published by the Publish Bundled Tools workflow, so the
      # release package builds without vendoring them here.
      - name: Package Donkey
        env:
          DONKEY_APP_VERSION: ${{ steps.release.outputs.version }}
          DONKEY_APP_BUILD: ${{ steps.release.outputs.build }}
          DONKEY_SPARKLE_FEED_URL: https://donkeyuse.com/appcast.xml
          DONKEY_SPARKLE_PUBLIC_ED_KEY: ${{ secrets.DONKEY_SPARKLE_PUBLIC_ED_KEY }}
          DONKEY_APP_SIGN_IDENTITY: ${{ steps.signing.outputs.identity }}
          DONKEY_NOTARY_KEY_P8: ${{ runner.temp }}/notary.p8
          DONKEY_NOTARY_KEY_ID: ${{ secrets.DONKEY_NOTARY_KEY_ID }}
          DONKEY_NOTARY_ISSUER_ID: ${{ secrets.DONKEY_NOTARY_ISSUER_ID }}
        run: ./scripts/package-donkey-app.sh

      - name: Generate checksum
        run: shasum -a 256 dist/Donkey.dmg > dist/Donkey.dmg.sha256

      - name: Sign update archive
        id: sparkle
        env:
          DONKEY_SPARKLE_PRIVATE_ED_KEY: ${{ secrets.DONKEY_SPARKLE_PRIVATE_ED_KEY }}
        run: |
          sign_update="$(find apps/Donkey/.build/artifacts/sparkle/Sparkle/bin -name sign_update -type f | head -n 1)"
          if [[ -z "$sign_update" ]]; then
            echo "Sparkle sign_update tool was not found after packaging." >&2
            exit 1
          fi

          signature="$(printf '%s' "$DONKEY_SPARKLE_PRIVATE_ED_KEY" | "$sign_update" --ed-key-file - -p dist/Donkey.dmg)"
          if [[ -z "$signature" ]]; then
            echo "Sparkle signature was empty." >&2
            exit 1
          fi
          echo "signature=$signature" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/Donkey.dmg dist/Donkey.dmg.sha256 --clobber
            gh release edit "$TAG" --title "Donkey $TAG"
          else
            gh release create "$TAG" dist/Donkey.dmg dist/Donkey.dmg.sha256 \
              --target "${{ steps.release.outputs.target_sha }}" \
              --title "Donkey $TAG" \
              --generate-notes
          fi

      - name: Promote website, appcast, and aliases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          args=(
            --repo "${{ github.repository }}"
            --version "${{ steps.release.outputs.version }}"
            --build "${{ steps.release.outputs.build }}"
            --sparkle-ed-signature "${{ steps.sparkle.outputs.signature }}"
            --asset-name "Donkey.dmg"
            --keep-releases 10
            --commit
          )

          python3 scripts/promote-github-release.py "${args[@]}"
