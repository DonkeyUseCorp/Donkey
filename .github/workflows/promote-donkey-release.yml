name: Release Donkey

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-donkey
  cancel-in-progress: false

jobs:
  release:
    name: Build and release
    # The macos-26 image carries the Xcode 26 SDK that defines the SpeechAnalyzer /
    # SpeechTranscriber APIs the app compiles against (gated to macOS 26 at runtime).
    # A later step selects that Xcode explicitly; the image default is not guaranteed.
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${{ github.event.repository.default_branch }}" "origin/${{ github.event.repository.default_branch }}"
          git branch --set-upstream-to="origin/${{ github.event.repository.default_branch }}" "${{ github.event.repository.default_branch }}"

      - name: Fetch tags
        run: git fetch --tags --force origin

      - name: Prepare release values
        id: release
        run: |
          version="$(python3 - "${{ inputs.bump }}" <<'PY'
          from __future__ import annotations

          import re
          import subprocess
          import sys

          bump = sys.argv[1]
          if bump not in {"major", "minor", "patch"}:
              raise SystemExit(f"Unsupported version bump: {bump}")

          tag_re = re.compile(r"^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$")
          tags = subprocess.check_output(["git", "tag", "--list"], text=True).splitlines()
          versions = [
              tuple(int(part) for part in match.groups())
              for tag in tags
              if (match := tag_re.match(tag.strip()))
          ]

          if versions:
              major, minor, patch = max(versions)
              if bump == "major":
                  major, minor, patch = major + 1, 0, 0
              elif bump == "minor":
                  minor, patch = minor + 1, 0
              else:
                  patch += 1
          else:
              major, minor, patch = 0, 1, 0

          print(f"{major}.{minor}.{patch}")
          PY
          )"

          build="${GITHUB_RUN_NUMBER}"
          if [[ ! "$build" =~ ^[0-9]+$ ]]; then
            echo "Build must be numeric for CFBundleVersion." >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "tag=v$version"
            echo "build=$build"
            echo "target_sha=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Check Sparkle secrets
        env:
          DONKEY_SPARKLE_PUBLIC_ED_KEY: ${{ secrets.DONKEY_SPARKLE_PUBLIC_ED_KEY }}
          DONKEY_SPARKLE_PRIVATE_ED_KEY: ${{ secrets.DONKEY_SPARKLE_PRIVATE_ED_KEY }}
        run: |
          if [[ -z "$DONKEY_SPARKLE_PUBLIC_ED_KEY" ]]; then
            echo "Missing DONKEY_SPARKLE_PUBLIC_ED_KEY repository secret." >&2
            exit 1
          fi
          if [[ -z "$DONKEY_SPARKLE_PRIVATE_ED_KEY" ]]; then
            echo "Missing DONKEY_SPARKLE_PRIVATE_ED_KEY repository secret." >&2
            exit 1
          fi

      - name: Install packaging dependencies
        run: |
          if ! command -v magick >/dev/null 2>&1; then
            brew install imagemagick
          fi

      # The bundled CLI tools (ffmpeg, lit, pdf-fill, qpdf, …) are gitignored and
      # built/fetched by fetch-bundled-tools.sh. Cache the result so we don't rebuild
      # ffmpeg/Rust from source every release; the key busts when the recipe or the
      # in-repo pdf-fill source changes.
      - name: Restore bundled tools cache
        id: tools-cache
        uses: actions/cache@v4
        with:
          path: vendor/donkey-tools
          key: donkey-tools-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/fetch-bundled-tools.sh', 'tools/pdf-fill/main.swift') }}

      - name: Vendor bundled tools
        if: steps.tools-cache.outputs.cache-hit != 'true'
        run: ./scripts/fetch-bundled-tools.sh

      # The macos-26 image ships several Xcodes and xcode-select does not reliably
      # default to the macOS 26 one, whose Speech SDK defines SpeechAnalyzer /
      # SpeechTranscriber. Pin DEVELOPER_DIR to the newest Xcode 26 so the build
      # compiles against the macOS 26 SDK.
      - name: Select Xcode with the macOS 26 SDK
        run: |
          dir="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [[ -z "$dir" ]]; then
            echo "No Xcode 26 found on this runner. Installed Xcodes:" >&2
            ls -d /Applications/Xcode*.app >&2 || true
            exit 1
          fi
          developer_dir="$dir/Contents/Developer"
          sudo xcode-select -s "$developer_dir"
          echo "DEVELOPER_DIR=$developer_dir" >> "$GITHUB_ENV"
          xcodebuild -version
          sdk_version="$(xcrun --sdk macosx --show-sdk-version)"
          echo "macOS SDK: $sdk_version"
          if [[ "${sdk_version%%.*}" -lt 26 ]]; then
            echo "Selected SDK $sdk_version predates macOS 26; SpeechAnalyzer is unavailable." >&2
            exit 1
          fi

      - name: Package Donkey
        env:
          DONKEY_APP_VERSION: ${{ steps.release.outputs.version }}
          DONKEY_APP_BUILD: ${{ steps.release.outputs.build }}
          DONKEY_SPARKLE_FEED_URL: https://donkeyuse.com/appcast.xml
          DONKEY_SPARKLE_PUBLIC_ED_KEY: ${{ secrets.DONKEY_SPARKLE_PUBLIC_ED_KEY }}
        run: ./scripts/package-donkey-app.sh

      - name: Generate checksum
        run: shasum -a 256 dist/Donkey.dmg > dist/Donkey.dmg.sha256

      - name: Sign update archive
        id: sparkle
        env:
          DONKEY_SPARKLE_PRIVATE_ED_KEY: ${{ secrets.DONKEY_SPARKLE_PRIVATE_ED_KEY }}
        run: |
          sign_update="$(find apps/Donkey/.build/artifacts/sparkle/Sparkle/bin -name sign_update -type f | head -n 1)"
          if [[ -z "$sign_update" ]]; then
            echo "Sparkle sign_update tool was not found after packaging." >&2
            exit 1
          fi

          signature="$(printf '%s' "$DONKEY_SPARKLE_PRIVATE_ED_KEY" | "$sign_update" --ed-key-file - -p dist/Donkey.dmg)"
          if [[ -z "$signature" ]]; then
            echo "Sparkle signature was empty." >&2
            exit 1
          fi
          echo "signature=$signature" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/Donkey.dmg dist/Donkey.dmg.sha256 --clobber
            gh release edit "$TAG" --title "Donkey $TAG"
          else
            gh release create "$TAG" dist/Donkey.dmg dist/Donkey.dmg.sha256 \
              --target "${{ steps.release.outputs.target_sha }}" \
              --title "Donkey $TAG" \
              --generate-notes
          fi

      - name: Promote website, appcast, and aliases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          args=(
            --repo "${{ github.repository }}"
            --version "${{ steps.release.outputs.version }}"
            --build "${{ steps.release.outputs.build }}"
            --sparkle-ed-signature "${{ steps.sparkle.outputs.signature }}"
            --asset-name "Donkey.dmg"
            --keep-releases 10
            --commit
          )

          python3 scripts/promote-github-release.py "${args[@]}"
